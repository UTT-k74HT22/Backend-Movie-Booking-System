# Docker Compose configuration for Movie Booking System
version: '3.8'

#Configure services
services:

  #Database service using MySQL 8.0
  db:
    image: mysql:8.0
    container_name: mysql-movie-booking
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_ROOT_HOST=%
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - demo-system
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  #Redis service using Redis 7.2 Alpine
  redis:
    image: redis:7.2-alpine
    container_name: redis-server-movie-booking
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - demo-system
    restart: unless-stopped

  #Redis UI service using redis-commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-ui-demo-system
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - demo-system
    restart: unless-stopped

    #Backend service for Movie Booking System: build from Dockerfile
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie-booking-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # --- SERVER ---
      - SERVER_PORT=${SERVER_PORT}

      # --- DATABASE ---
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}

      # --- REDIS ---
      - SPRING_DATA_REDIS_HOST=${SPRING_DATA_REDIS_HOST}
      - SPRING_DATA_REDIS_PORT=${SPRING_DATA_REDIS_PORT}

      # --- CORS ---
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}

      # --- MAIL (trùng với application.yml: MAIL_* ) ---
      - MAIL_HOST=${MAIL_HOST}
      - MAIL_PORT=${MAIL_PORT}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_SMTP_AUTH=${MAIL_SMTP_AUTH}
      - MAIL_STARTTLS_ENABLE=${MAIL_STARTTLS_ENABLE}

      # --- JWT (trùng với application.yml: ${JWT_ACCESS_KEY:...}) ---
      - JWT_ACCESS_KEY=${JWT_ACCESS_KEY}
      - JWT_ACCESS_TOKEN_EXPIRY_MINUTES=${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRY_DAYS=${JWT_REFRESH_TOKEN_EXPIRY_DAYS}

      # --- OTP ---
      - OTP_TTL_MINUTES=${OTP_TTL_MINUTES}
      - OTP_RESEND_LIMIT_SECONDS=${OTP_RESEND_LIMIT_SECONDS}
      - OTP_COUNT_TTL_HOURS=${OTP_COUNT_TTL_HOURS}
      - OTP_MAX_SEND_PER_DAY=${OTP_MAX_SEND_PER_DAY}

      # --- VNPAY ---
      - VNPAY_TMNCODE=${VNPAY_TMNCODE}
      - VNPAY_HASH_SECRET=${VNPAY_HASH_SECRET}
      - VNPAY_PAYURL=${VNPAY_PAYURL}
      - VNPAY_RETURN_URL=${VNPAY_RETURN_URL}
      - VNPAY_IPN_URL=${VNPAY_IPN_URL}

      # --- SPRINGDOC ---
      - SPRING_OUTPUT_ANSI_ENABLED=ALWAYS

    ports:
      - "8080:8080"
    networks:
      - demo-system
    restart: unless-stopped

#Define named volumes for persistent data storage
volumes:
  mysql_data:
  redis_data:

#Define custom network
networks:
  demo-system:
    driver: bridge

#log:  docker logs -f movie-booking-backend
#build: docker-compose up --build -d
#stop: docker-compose down
#restart: docker-compose restart
#remove volumes: docker-compose down -v
#deploy server: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#access mysql: docker exec -it mysql-movie-booking mysql -uroot -p
#access redis: docker exec -it redis-server-movie-booking redis-cli
#access redis-ui: http://localhost:8081
#access backend api docs: http://localhost:8080/swagger-ui/index.html