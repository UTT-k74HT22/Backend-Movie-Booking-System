# Application configuration for Movie Booking System
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

#  Define application-specific properties
spring:

  #Define application name
  application:
    name: movie-booking

  # Database configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA and Hibernate configuration
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # Mail configuration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:true}

  # Redis configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}

  # File upload configuration
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

# CORS configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}
  allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true


# Security and JWT configuration
jwt:
  accessKey: ${JWT_ACCESS_KEY}
  access-token-expiry-minutes: ${JWT_ACCESS_TOKEN_EXPIRY_MINUTES}
  refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS}
  expiryMinutes: 5
  expiryDay: 14

# OTP configuration
otp:
  ttl-minutes: ${OTP_TTL_MINUTES}
  resend-limit-seconds: ${OTP_RESEND_LIMIT_SECONDS}
  count-ttl-hours: ${OTP_COUNT_TTL_HOURS}
  max-send-per-day: ${OTP_MAX_SEND_PER_DAY}

# Swagger / OpenAPI configuration
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    url: /v3/api-docs/movie-booking-system

openapi:
  service:
    api-docs: movie-booking-system
    server: http://localhost:${SERVER_PORT}
    title: Movie Booking System
    version: 1.0.0

# Logging configuration
logging:
  level:
    root: INFO
    com.trainning.movie_booking_system: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# VNPAY configuration
vnpay:
  tmnCode: ${VNPAY_TMNCODE}
  hashSecret: ${VNPAY_HASH_SECRET}
  payUrl: ${VNPAY_PAYURL}
  returnUrl: ${VNPAY_RETURN_URL}
  ipnUrl: ${VNPAY_IPN_URL}
