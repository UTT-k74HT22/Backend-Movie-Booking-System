
# SERVER CONFIGURATION
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

# SPRING CONFIGURATION
spring:
  application:
    name: movie-booking

    # DATABASE CONFIGURATION
    datasource:
      url: jdbc:mysql://localhost:3306/movie_booking?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: root
      password: root

    # Connection Pool Configuration (HikariCP)
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
      auto-commit: true

  # JPA/HIBERNATE CONFIGURATION
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
        use_sql_comments: true
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

  # JACKSON CONFIGURATION
  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Asia/Ho_Chi_Minh
    default-property-inclusion: non_null

  # MULTIPART FILE UPLOAD
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB


# JWT CONFIGURATION
jwt:
  signer-key: aBnrs4hYjaOfUC8C5Qa6A7cY4a8J84cJ47D/f16+nBZ1vmv/Q4wJd9Hf2nKJYZ4N
  valid-duration: 3600        # Access token: 1 hour (in seconds)
  refreshable-duration: 86400 # Refresh token: 24 hours (in seconds)
  issuer: movie-booking-system


# LOGGING CONFIGURATION

logging:
  level:
    root: INFO
    com.moviebooking: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 30

# MANAGEMENT & ACTUATOR (Optional)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized